<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Icon Section -->
  <g transform="translate(10, 0)">
    <!-- Outer Diamond Box -->
    <rect x="25" y="25" width="70" height="70" fill="none" stroke="#000000" stroke-width="10" transform="rotate(45 60 60)" />
    
    <!-- Inner Diamond Box -->
    <rect x="42.5" y="42.5" width="35" height="35" fill="none" stroke="#000000" stroke-width="7" transform="rotate(45 60 60)" />
    
    <!-- Connecting Horizontal Bars -->
    <line x1="28" y1="60" x2="42" y2="60" stroke="#000000" stroke-width="8" stroke-linecap="square" />
    <line x1="78" y1="60" x2="92" y2="60" stroke="#000000" stroke-width="8" stroke-linecap="square" />
  </g>

  <!-- Typography Section -->
  <text x="140" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="900" letter-spacing="3" fill="#000000">
    ADIDA EVENTS
  </text>
</svg>
